<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhilBrowser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: #111827; }
        .nav-bar { -webkit-app-region: drag; }
        .nav-bar input, .nav-bar button, .nav-bar svg { -webkit-app-region: no-drag; }
        webview { flex: 1; border: none; background: #fff; }
        #back, #forward { transition: transform 0.2s, color 0.2s; }
        /* Hide all scrollbars globally */
        * { scrollbar-width: none !important; }
        *::-webkit-scrollbar { display: none !important; }

        /* Navbar styling */
        header.nav-bar { 
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Private Mode Styling */
        .private-badge { display: none; }
        body.private-mode .private-badge { display: flex; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-300">
    
    <!-- Tab Bar -->
    <div id="tab-bar" class="h-8 bg-black/5 dark:bg-black/20 flex items-center px-2 gap-1 overflow-x-auto border-b border-black/10 dark:border-white/5 relative z-50 transition-colors duration-300">
        <!-- Tabs will be injected here -->
        <button id="add-tab" class="p-1 hover:bg-white dark:hover:bg-white/10 rounded-md transition-colors text-gray-500 shrink-0 ml-1 shadow-sm dark:shadow-none" title="Nouvel onglet">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7v14"/></svg>
        </button>
    </div>

    <!-- Navigation Bar -->
    <header class="nav-bar h-16 flex items-center px-4 gap-2 z-30 relative transition-colors duration-300">
        <!-- 1. Navigation section (Back/Forward) -->
        <div class="flex items-center gap-0.5">
            <button id="back" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-20" title="Précédent">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="forward" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-20" title="Suivant">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <!-- 2. Refresh (O) -->
        <button id="refresh" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Recharger">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>

        <!-- 3. Maison (Home) -->
        <button id="home" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Accueil">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>

        <!-- 4. Jumelle (Private) -->
        <button id="private-btn" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Navigation Privée">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v2"/><path d="M4 14v4a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z"/><path d="M20 14v4a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2z"/><path d="M4 14l2-6a2 2 0 0 1 2-1h0a2 2 0 0 1 2 1l2 6"/><path d="M12 14l2-6a2 2 0 0 1 2-1h0a2 2 0 0 1 2 1l2 6"/></svg>
        </button>

        <!-- 5. Horloge (History) -->
        <button id="history-btn" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Historique">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>

        <!-- 6. Search Bar Section (Flex-1 to take space) -->
        <div class="flex-1 max-w-2xl mx-auto flex items-center space-x-2 bg-black/5 dark:bg-white/5 rounded-full px-4 py-1.5 border border-black/5 dark:border-white/5 focus-within:border-blue-500/30 focus-within:bg-white dark:focus-within:bg-white/10 transition-all relative group shadow-inner">
            <svg class="text-gray-400 dark:text-gray-500 group-focus-within:text-blue-500 dark:group-focus-within:text-blue-400 transition-colors shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="url-input" type="text" class="bg-transparent border-none outline-none text-sm text-gray-800 dark:text-gray-200 w-full placeholder-gray-400 dark:placeholder-gray-500 font-medium pr-12" placeholder="Rechercher ou entrer une URL..." autocomplete="off">
            
            <div class="absolute right-4 flex items-center gap-2">
                <!-- Bookmark Star -->
                <button id="bookmark-btn" class="p-1 text-gray-400 hover:text-yellow-500 dark:hover:text-yellow-400 transition-colors" title="Ajouter aux favoris">
                    <svg id="bookmark-star" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </button>
            </div>

            <!-- Suggestions container -->
            <div id="suggestions-container" class="absolute top-full left-0 right-0 mt-3 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-black/10 dark:border-white/10 rounded-2xl shadow-2xl overflow-hidden opacity-0 pointer-events-none transition-all z-50"></div>
        </div>

        <!-- 7, 8, 9. Actions (Download, Settings, Shield) -->
        <div class="flex items-center gap-1 shrink-0">
            <div class="relative">
                <button id="downloads-btn" class="p-2 rounded-lg transition-all text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10 relative" title="Téléchargements">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span id="downloads-badge" class="absolute top-1 right-1 w-2 h-2 bg-blue-500 rounded-full opacity-0"></span>
                </button>
                <div id="downloads-popup" class="absolute top-full right-0 mt-2 w-64 bg-white dark:bg-gray-800 border border-black/10 dark:border-white/10 rounded-2xl shadow-2xl py-3 z-[100] opacity-0 pointer-events-none transition-all transform translate-y-[-10px]">
                    <div class="px-4 mb-2 flex items-center justify-between font-bold text-xs text-gray-400 uppercase tracking-widest">
                        <span>Téléchargements</span>
                        <button id="clear-downloads" class="text-[10px] text-gray-500 hover:text-blue-500">Vider</button>
                    </div>
                    <div id="downloads-list" class="max-h-60 overflow-y-auto space-y-1">
                        <div class="px-4 py-8 text-center text-xs text-gray-400 italic">Aucun téléchargement</div>
                    </div>
                </div>
            </div>

            <button id="settings-btn" class="p-2 rounded-lg transition-all text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10" title="Paramètres">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>

            <div class="relative">
                <button id="adblock-btn" class="p-2 rounded-lg transition-all text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10" title="Bloqueur de pub">
                    <svg id="adblock-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </button>
                <div id="adblock-popup" class="absolute top-full right-0 mt-3 w-56 bg-white dark:bg-gray-900 border border-black/10 dark:border-white/10 rounded-2xl shadow-2xl p-4 opacity-0 pointer-events-none transition-all z-50 transform scale-95 origin-top-right">
                    <div class="flex items-center justify-between mb-4 text-xs font-bold uppercase tracking-wider text-gray-500">
                        <span>Bloqueur</span>
                        <div id="adblock-status-badge" class="px-2 py-0.5 rounded-full bg-green-500/10 text-green-600 dark:text-green-400">Actif</div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between text-sm text-gray-600 dark:text-gray-400">
                            <span>Pubs bloquées</span>
                            <span id="adblock-count" class="text-lg font-bold text-blue-600 dark:text-blue-400">0</span>
                        </div>
                        <button id="adblock-main-toggle" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-colors">Désactiver</button>
                    </div>
                </div>
            </div>

            <!-- 10. Separator -->
            <div class="w-px h-6 bg-black/10 dark:bg-white/10 mx-1"></div>

            <!-- 11, 12, 13. Window Controls (- Max X) -->
            <button id="win-minimize" class="p-2 rounded-lg transition-all text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10" title="Réduire">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
            </button>
            <button id="win-maximize" class="p-2 rounded-lg transition-all text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10" title="Agrandir">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button id="win-close" class="p-2 rounded-lg transition-all text-gray-500 hover:text-white hover:bg-red-500/80" title="Fermer">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
    </header>
        </div>
        </div>
    </header>

    <!-- Sidebar Overlay & Panel -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/10 dark:bg-black/40 backdrop-blur-[2px] z-[90] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-[350px] bg-white dark:bg-gray-900 border-l border-black/10 dark:border-white/10 z-[100] transform translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col" style="-webkit-app-region: no-drag;">
        <div class="p-6 border-b border-black/5 dark:border-white/5 space-y-4">
            <div class="flex items-center justify-between gap-4">
                <button id="close-sidebar" class="p-3 -ml-2 text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/5 rounded-xl transition-all" title="Fermer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
                <div class="flex-1 flex items-center p-1 bg-black/5 dark:bg-gray-950/50 rounded-xl border border-black/5 dark:border-white/5" style="-webkit-app-region: no-drag;">
                    <button id="sb-show-history" class="sidebar-tab flex-1 py-3.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-blue-600 dark:text-blue-400 bg-white dark:bg-blue-500/10 shadow-sm">Histoire</button>
                    <button id="sb-show-bookmarks" class="sidebar-tab flex-1 py-3.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">Favoris</button>
                    <button id="sb-show-sessions" class="sidebar-tab flex-1 py-3.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">Sessions</button>
                </div>
            </div>
            <div class="relative group">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 group-focus-within:text-blue-500 dark:group-focus-within:text-blue-400 transition-colors" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="sidebar-search" type="text" placeholder="Rechercher..." class="w-full bg-black/5 dark:bg-gray-950/50 border border-black/5 dark:border-white/5 rounded-xl py-2 pl-9 pr-4 text-sm text-gray-900 dark:text-gray-200 outline-none focus:border-blue-500/50 focus:bg-white dark:focus:bg-gray-950/80 transition-all">
            </div>
        </div>
        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Content dynamically injected here -->
        </div>
    </aside>
    
    <!-- Find in Page Bar -->
    <div id="find-bar" class="fixed top-[112px] right-8 z-[60] bg-white dark:bg-gray-800 border border-black/10 dark:border-white/10 rounded-xl shadow-2xl flex items-center p-1.5 gap-2 opacity-0 pointer-events-none translate-y-[-10px] transition-all duration-200">
        <div class="flex items-center gap-2 px-3 py-1.5 bg-black/5 dark:bg-white/5 rounded-lg border border-black/5 dark:border-white/5">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="find-input" type="text" placeholder="Rechercher..." class="bg-transparent border-none outline-none text-sm text-gray-800 dark:text-gray-200 w-40 placeholder-gray-500">
            <span id="find-results" class="text-[10px] font-bold text-gray-400 font-mono min-w-[40px] text-right">0/0</span>
        </div>
        <div class="flex items-center gap-1 border-l border-black/10 dark:border-white/10 pl-2">
            <button id="find-prev" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg text-gray-500 transition-colors" title="Précédent">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            </button>
            <button id="find-next" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-lg text-gray-500 transition-colors" title="Suivant">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <button id="find-close" class="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg text-gray-400 transition-colors" title="Fermer (Echap)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
    </div>

    <!-- Session Save Modal -->
    <div id="session-modal" class="fixed inset-0 z-[200] flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="session-modal-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative bg-white dark:bg-gray-800 w-full max-w-sm mx-4 rounded-2xl shadow-2xl p-6 transform scale-95 transition-transform">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Enregistrer la session ?</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Souhaitez-vous enregistrer vos onglets ouverts pour les rouvrir plus tard ?</p>
            
            <input type="text" id="session-name-input" placeholder="Nom de la session (ex: Projet Web)" 
                class="w-full px-4 py-2 bg-gray-100 dark:bg-gray-700 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-6 dark:text-white">

            <div class="flex gap-3">
                <button id="session-skip" class="flex-1 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-colors">Quitter sans sauver</button>
                <button id="session-save" class="flex-1 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-xl shadow-lg shadow-blue-500/20 transition-all">Enregistrer & Quitter</button>
            </div>
            <button id="session-cancel" class="w-full mt-3 py-2 text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">Annuler</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[200] flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="settings-modal-overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative bg-white dark:bg-gray-800 w-full max-w-md mx-4 rounded-2xl shadow-2xl p-6 transform scale-95 transition-transform">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Paramètres</h3>
                <button id="settings-close" class="p-2 hover:bg-black/5 dark:hover:bg-white/10 rounded-full transition-colors text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Nickname -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Pseudo (Dashboard)</label>
                    <input id="settings-nickname" type="text" placeholder="Votre pseudo" class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500/50 transition-all dark:text-white dark:bg-gray-700">
                </div>

                <!-- Search Engine -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Moteur de recherche</label>
                    <select id="settings-search-engine" class="w-full bg-black/5 dark:bg-white/10 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500/50 transition-all text-gray-900 dark:text-white">
                        <option class="bg-white dark:bg-gray-800 text-gray-900 dark:text-white" value="https://www.google.com/search?q=">Google</option>
                        <option class="bg-white dark:bg-gray-800 text-gray-900 dark:text-white" value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                        <option class="bg-white dark:bg-gray-800 text-gray-900 dark:text-white" value="https://www.bing.com/search?q=">Bing</option>
                        <option class="bg-white dark:bg-gray-800 text-gray-900 dark:text-white" value="https://search.yahoo.com/search?p=">Yahoo</option>
                    </select>
                </div>

                <!-- HomePage -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Page d'accueil</label>
                    <input id="settings-homepage" type="text" placeholder="URL ou 'dashboard'" class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500/50 transition-all dark:text-white dark:bg-gray-700">
                </div>

                <!-- Privacy/Data -->
                <div class="space-y-2 pt-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Confidentialité</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="settings-clear-history" class="py-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-600 dark:text-red-400 rounded-xl text-xs font-bold transition-all">Effacer l'historique</button>
                        <button id="settings-clear-cache" class="py-2.5 bg-gray-500/10 hover:bg-gray-500/20 text-gray-600 dark:text-gray-400 rounded-xl text-xs font-bold transition-all">Vider le cache</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex justify-end">
                <button id="settings-save" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-600/20 transition-all">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Browser Content -->
    <div id="webview-container" class="flex-1 relative bg-white">
        <!-- webviews will be injected here -->
    </div>

    <!-- Swipe Indicators -->
    <div id="swipe-indicator-left" class="fixed left-0 top-1/2 -translate-y-1/2 -translate-x-full w-24 h-48 flex items-center justify-start pl-4 pointer-events-none transition-all duration-75 z-50">
        <div class="w-16 h-16 rounded-full bg-blue-500/20 backdrop-blur-md border border-blue-400/30 flex items-center justify-center text-blue-400 shadow-lg shadow-blue-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </div>
    </div>
    <div id="swipe-indicator-right" class="fixed right-0 top-1/2 -translate-y-1/2 translate-x-full w-24 h-48 flex items-center justify-end pr-4 pointer-events-none transition-all duration-75 z-50">
        <div class="w-16 h-16 rounded-full bg-blue-500/20 backdrop-blur-md border border-blue-400/30 flex items-center justify-center text-blue-400 shadow-lg shadow-blue-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-9-6"/></svg>
        </div>
    </div>

    <!-- Custom Context Menu for Tabs -->
    <div id="tab-context-menu" class="fixed z-[100] bg-white dark:bg-gray-800 border border-black/10 dark:border-white/10 rounded-xl shadow-2xl py-1.5 w-48 opacity-0 pointer-events-none transition-all transform scale-95 origin-top-left">
        <button id="cm-pin" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-black/5 dark:hover:bg-white/10 transition-colors flex items-center justify-between">
            <span id="pin-text">Épingler</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></svg>
        </button>
        <button id="cm-duplicate" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Dupliquer</button>
        <div class="h-px bg-black/5 dark:bg-white/5 my-1"></div>
        <button id="cm-close" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-500/10 transition-colors font-medium">Fermer</button>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
