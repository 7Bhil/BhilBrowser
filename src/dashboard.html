<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhilBrowser - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('assets/bg.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        .clock {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }
        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
        }
        .search-container:focus-within {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 1.1rem;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .quick-links {
            margin-top: 4rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <div class="greeting" id="greeting">Bonjour, Bhil</div>

    <div class="search-container glass flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Rechercher sur le web..." autofocus>
    </div>

    <div class="quick-links">
        <a href="https://github.com" class="link-card">
            <div class="icon-box glass">G</div>
            <span class="text-xs opacity-70">GitHub</span>
        </a>
        <a href="https://youtube.com" class="link-card">
            <div class="icon-box glass">Y</div>
            <span class="text-xs opacity-70">YouTube</span>
        </a>
        <a href="https://twitter.com" class="link-card">
            <div class="icon-box glass">T</div>
            <span class="text-xs opacity-70">Twitter</span>
        </a>
        <a href="https://chatgpt.com" class="link-card">
            <div class="icon-box glass">AI</div>
            <span class="text-xs opacity-70">ChatGPT</span>
        </a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
            
            const hour = now.getHours();
            let g = "Bonjour";
            if (hour >= 18) g = "Bonsoir";
            if (hour >= 23 || hour < 5) g = "Bonne nuit";
            document.getElementById('greeting').textContent = `${g}, Bhil`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
