<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhilBrowser - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('assets/bg.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        .clock {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }
        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
        }
        .search-container:focus-within {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 1.1rem;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .quick-links {
            margin-top: 4rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <div class="greeting" id="greeting">Bonjour, Bhil</div>

    <div class="search-container glass flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Rechercher sur le web..." autofocus>
    </div>

    <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-6 py-12">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- History Section (Left/Center) -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Historique Récent
                        </h3>
                        <button onclick="clearHistory()" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Effacer tout</button>
                    </div>
                    
                    <div id="history-list" class="space-y-2">
                        <!-- History items will be injected here -->
                        <div class="text-center py-12 text-gray-600 bg-gray-900/30 rounded-2xl border border-white/5 border-dashed">
                            Aucun historique pour le moment
                        </div>
                    </div>
                </div>

                <!-- Bookmarks Section (Right Sidebar) -->
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-400"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            Favoris
                        </h3>
                        <a href="favorites.html" class="text-[10px] text-blue-400 hover:text-blue-300 font-bold uppercase tracking-widest transition-colors">Tout voir</a>
                    </div>
                    
                    <div id="bookmarks-list" class="grid grid-cols-1 gap-3">
                        <!-- Bookmark items will be injected here -->
                        <div class="text-center py-8 text-gray-600 bg-gray-900/30 rounded-2xl border border-white/5 border-dashed">
                            Aucun favori
                        </div>
                    </div>
                </div>

            </div>
        </main>

    <script>
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-gray-600 bg-gray-900/30 rounded-2xl border border-white/5 border-dashed">Aucun historique pour le moment</div>';
                return;
            }
            list.innerHTML = history.slice(0, 15).map(item => `
                <a href="${item.url}" class="group flex items-center justify-between p-4 bg-gray-900/40 hover:bg-gray-800/60 rounded-xl border border-white/5 transition-all hover:scale-[1.01] active:scale-[0.99]">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center shrink-0">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(item.url).hostname}" class="w-4 h-4" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-medium text-gray-200 truncate group-hover:text-blue-400 transition-colors">${item.title || item.url}</p>
                            <p class="text-xs text-gray-500 truncate">${new URL(item.url).hostname}</p>
                        </div>
                    </div>
                    <span class="text-[10px] text-gray-600 font-mono">${new Date(item.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </a>
            `).join('');
        }

        function renderBookmarks(bookmarks) {
            const list = document.getElementById('bookmarks-list');
            if (!bookmarks || bookmarks.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-gray-600 bg-gray-900/30 rounded-2xl border border-white/5 border-dashed">Aucun favori</div>';
                return;
            }
            list.innerHTML = bookmarks.map(item => `
                <a href="${item.url}" class="group flex items-center gap-4 p-4 bg-white/5 hover:bg-white/10 rounded-xl border border-white/5 transition-all">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-500/20 to-orange-500/20 flex items-center justify-center shrink-0">
                        <img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(item.url).hostname}" class="w-5 h-5">
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-semibold text-gray-200 truncate group-hover:text-yellow-400 transition-colors">${item.title || item.url}</p>
                        <p class="text-xs text-gray-500 truncate">${new URL(item.url).hostname}</p>
                    </div>
                </a>
            `).join('');
        }

        // Called by renderer.js after page loads
        window.injectDashboardData = function(history, bookmarks) {
            renderHistory(history);
            renderBookmarks(bookmarks);
        };

        function clearHistory() {
            // Signal to parent renderer to clear history
            if (confirm('Voulez-vous vraiment effacer tout l\'historique ?')) {
                window.dispatchEvent(new CustomEvent('clear-history'));
                renderHistory([]);
            }
        }
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
            
            const hour = now.getHours();
            let g = "Bonjour";
            if (hour >= 18) g = "Bonsoir";
            if (hour >= 23 || hour < 5) g = "Bonne nuit";
            document.getElementById('greeting').textContent = `${g}, Bhil`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
