<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhilBrowser - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            padding-top: 15rem; /* Pushed significantly lower for visibility */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .bg-layer {
            position: absolute;
            inset: 0;
            background: url('assets/bg.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -2;
        }
        .bg-overlay {
            position: absolute;
            inset: 0;
            z-index: -1;
            transition: background-color 0.3s;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        .clock {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }
        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
        }
        .search-container:focus-within {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 1.1rem;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .quick-links {
            margin-top: 4rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1.25rem;
        }
    </style>
</head>
<body class="text-gray-900 dark:text-white transition-colors duration-300">
    <div class="bg-layer"></div>
    <div class="bg-overlay bg-white/70 dark:bg-black/20"></div>

    <div class="clock text-gray-800 dark:text-white" id="clock">00:00</div>
    <div class="greeting text-gray-600 dark:text-gray-300" id="greeting">Bonjour, Bhil</div>

    <div class="search-container glass flex items-center gap-3 bg-white/50 dark:bg-white/5 border-black/10 dark:border-white/10 text-gray-800 dark:text-gray-200 focus-within:bg-white dark:focus-within:bg-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 dark:text-gray-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Rechercher sur le web..." class="text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400" autofocus>
    </div>

    <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-6 py-12 w-full">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- History Section (Left/Center) -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 dark:text-blue-400"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Historique Récent
                        </h3>
                        <button onclick="clearHistory()" class="text-xs text-gray-500 hover:text-red-500 dark:hover:text-red-400 transition-colors">Effacer tout</button>
                    </div>
                    
                    <div id="history-list" class="space-y-2">
                        <!-- History items will be injected here -->
                        <div class="text-center py-12 text-gray-500 dark:text-gray-600 bg-black/5 dark:bg-gray-900/30 rounded-2xl border border-black/10 dark:border-white/5 border-dashed">
                            Aucun historique pour le moment
                        </div>
                    </div>
                </div>

                <!-- Bookmarks Section (Right Sidebar) -->
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500 dark:text-yellow-400"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            Favoris
                        </h3>
                        <a href="favorites.html" class="text-[10px] text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 font-bold uppercase tracking-widest transition-colors">Tout voir</a>
                    </div>
                    
                    <div id="bookmarks-list" class="grid grid-cols-1 gap-3">
                        <!-- Bookmark items will be injected here -->
                        <div class="text-center py-8 text-gray-500 dark:text-gray-600 bg-black/5 dark:bg-gray-900/30 rounded-2xl border border-black/10 dark:border-white/5 border-dashed">
                            Aucun favori
                        </div>
                    </div>
                </div>

            </div>
        </main>

    <script>
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-gray-500 dark:text-gray-600 bg-black/5 dark:bg-gray-900/30 rounded-2xl border border-black/10 dark:border-white/5 border-dashed">Aucun historique pour le moment</div>';
                return;
            }
            list.innerHTML = history.slice(0, 15).map(item => {
                try {
                    const hostname = new URL(item.url).hostname;
                    return `
                        <a href="${item.url}" class="group flex items-center justify-between p-4 bg-white/40 dark:bg-gray-900/40 hover:bg-white/80 dark:hover:bg-gray-800/60 rounded-xl border border-black/5 dark:border-white/5 transition-all hover:scale-[1.01] active:scale-[0.99] shadow-sm dark:shadow-none">
                            <div class="flex items-center gap-4 overflow-hidden">
                                <div class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-500/10 flex items-center justify-center shrink-0">
                                    <img src="https://www.google.com/s2/favicons?sz=64&domain=${hostname}" class="w-4 h-4" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=google.com'">
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-medium text-gray-800 dark:text-gray-200 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${item.title || item.url}</p>
                                    <p class="text-xs text-gray-500 dark:text-gray-500 truncate">${hostname}</p>
                                </div>
                            </div>
                            <span class="text-[10px] text-gray-400 dark:text-gray-600 font-mono">${new Date(item.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </a>
                    `;
                } catch(e) { return ''; }
            }).join('');
        }

        function renderBookmarks(bookmarks) {
            const list = document.getElementById('bookmarks-list');
            if (!bookmarks || bookmarks.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-gray-500 dark:text-gray-600 bg-black/5 dark:bg-gray-900/30 rounded-2xl border border-black/10 dark:border-white/5 border-dashed">Aucun favori</div>';
                return;
            }
            list.innerHTML = bookmarks.map(item => {
                try {
                    const hostname = new URL(item.url).hostname;
                    return `
                        <a href="${item.url}" class="group flex items-center gap-4 p-4 bg-white/40 dark:bg-white/5 hover:bg-white/80 dark:hover:bg-white/10 rounded-xl border border-black/5 dark:border-white/5 transition-all shadow-sm dark:shadow-none">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-100 to-orange-100 dark:from-yellow-500/20 dark:to-orange-500/20 flex items-center justify-center shrink-0">
                                <img src="https://www.google.com/s2/favicons?sz=64&domain=${hostname}" class="w-5 h-5">
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-sm font-semibold text-gray-800 dark:text-gray-200 truncate group-hover:text-yellow-600 dark:group-hover:text-yellow-400 transition-colors">${item.title || item.url}</p>
                                <p class="text-xs text-gray-500 truncate">${hostname}</p>
                            </div>
                        </a>
                    `;
                } catch(e) { return ''; }
            }).join('');
        }

        let currentSearchEngine = "https://www.google.com/search?q=";

        // Called by renderer.js after page loads
        window.injectDashboardData = function(history, bookmarks, theme = 'dark', searchEngine, nickname = 'Bhil') {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            if (searchEngine) currentSearchEngine = searchEngine;
            
            // Set nickname for updateClock and initial display
            window.userNickname = nickname;
            updateClock();
            
            renderHistory(history);
            renderBookmarks(bookmarks);
        };

        async function clearHistory() {
            // Signal to parent renderer to clear history
            if (confirm('Voulez-vous vraiment effacer tout l\'historique ?')) {
                if (window.electronAPI && window.electronAPI.store) {
                    await window.electronAPI.store.clearHistory();
                }
                renderHistory([]);
            }
        }
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const hour = now.getHours();
            let g = "Bonjour";
            if (hour >= 18) g = "Bonsoir";
            if (hour >= 23 || hour < 5) g = "Bonne nuit";
            const nickname = window.userNickname || "Bhil";
            document.getElementById('greeting').textContent = `${g}, ${nickname}`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    window.location.href = currentSearchEngine + encodeURIComponent(query);
                }
            }
        });
    </script>
</body>
</html>
