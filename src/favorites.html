<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-12">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-500">Mis en Favoris</h1>
            <a href="dashboard.html" class="p-2 glass rounded-full hover:bg-white/10 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
        </header>

        <div id="favorites-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Favorites items will be injected here -->
        </div>
    </div>

    <script>
        const Store = require('./store');

        function renderFavorites() {
            const bookmarks = Store.getBookmarks();
            const grid = document.getElementById('favorites-grid');

            if (bookmarks.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center glass rounded-3xl border-dashed border-2 border-white/5">
                        <p class="text-gray-500 text-lg">Vous n'avez pas encore de favoris.</p>
                        <p class="text-gray-600 text-sm mt-2">Cliquez sur l'étoile dans la barre d'adresse pour en ajouter.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = bookmarks.map(item => `
                <div class="glass p-6 rounded-2xl flex items-center justify-between group hover:scale-[1.02] transition-all">
                    <a href="${item.url}" class="flex items-center gap-4 flex-1 overflow-hidden">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-yellow-500/20 to-orange-500/20 flex items-center justify-center shrink-0">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=${new URL(item.url).hostname}" class="w-6 h-6">
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-semibold text-gray-100 truncate group-hover:text-yellow-400 transition-colors">${item.title || item.url}</h3>
                            <p class="text-xs text-gray-500 truncate">${item.url}</p>
                        </div>
                    </a>
                    <button onclick="removeFavorite('${item.url}')" class="p-2 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeFavorite(url) {
            Store.removeBookmark(url);
            renderFavorites();
        }

        window.onload = renderFavorites;
    </script>
</body>
</html>
